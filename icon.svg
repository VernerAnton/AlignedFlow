<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#7B5EA7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer timer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="18"/>
  <!-- Arc segment (about 75% full) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="18"
    stroke-dasharray="895 1193" stroke-dashoffset="298" stroke-linecap="round"
    transform="rotate(-90 256 256)"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="22" fill="white" opacity="0.9"/>
  <!-- Flow lines (spine/alignment symbol) -->
  <path d="M256 130 Q280 180 256 230 Q232 280 256 330" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
</svg>
